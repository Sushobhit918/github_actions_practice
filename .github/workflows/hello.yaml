name: My First Workflow

on: [push,pull_request]
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"
      - name: Print Names
        run: echo "Hello , Sushobhit"
  say-bye:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: echo "Goodbye, Github Actions!"
      - name: Print Names
        run: echo "Goodbye"